<div
    class="w-full overflow-clip rounded-2xl border-2 border-gray-200 dark:border-gray-700 shadow-lg transition duration-300 ease-in-out">
    <div class="aspect-video w-full">
        <img class="h-full w-full object-cover" [src]="imagenURL" [alt]="altImagen" />
    </div>
    <div class="p-4">
        <h2 class="truncate text-lg font-semibold">{{titulo}}</h2>
        <p class="mb-4 line-clamp-3 text-sm font-light">{{descripcion}}</p>
        <div class="flex justify-end">
            <button
                class="rounded-lg bg-blue-400 p-2 font-semibold text-white shadow-lg cursor-pointer hover:bg-blue-500 transition duration-300 ease-in-out active:bg-black active:scale-95 disabled:bg-gray-400 disabled:cursor-not-allowed"
                [disabled]="botonDeshabilitado" (click)="MandarImagen()">Agrandar Imagen</button>
        </div>
    </div>
</div>
