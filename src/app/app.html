<div class="w-full bg-base-200 flex justify-between gap-3 py-8 px-80 items-center transition duration-300 ease-in-out">
  <h1 class="text-3xl font-bold">Ejemplo Uso Componentes</h1>
  <button
    class="relative p-3 rounded-full cursor-pointer bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 shadow-sm text-amber-500 dark:text-indigo-400 hover:bg-amber-50 dark:hover:bg-gray-700 hover:shadow-md hover:shadow-amber-500/30 dark:hover:shadow-indigo-500/30 active:scale-90 transition-all duration-300 ease-out group"
    (click)="cambiarIcono()">
    <div
      class="absolute inset-0 bg-amber-400/10 dark:bg-indigo-400/10 rounded-full scale-0 group-hover:scale-100 transition-transform duration-300">
    </div>
    <svg [lucideIcon]="icon()"
      class="relative z-10 w-6 h-6 transition-transform duration-500 group-hover:rotate-12 dark:group-hover:-rotate-12"></svg>
  </button>
</div>

<div class="grid grid-cols-3 py-6 px-80 gap-6">
  @for (card of listaCards; track $index) {
  <app-tarjeta [imagenURL]="card.imagenURL" [altImagen]="card.altImagen" [titulo]="card.titulo"
    [descripcion]="card.descripcion" [botonDeshabilitado]="card.botonDeshabilitado"
    (agrandarImagen)="recibirImagenAAgrandar($event)"></app-tarjeta>
  } @empty {
  <p class="text-center text-lg font-semibold col-span-3">No hay tarjetas</p>
  }
</div>

<form (ngSubmit)="crearCard()" class="w-full px-80 transition duration-300 ease-in-out">
  <fieldset
    class="fieldset bg-base-200 border-base-300 rounded-box w-full border p-4 transition duration-300 ease-in-out">
    <legend class="fieldset-legend transition duration-300 ease-in-out">Crea tu propia Card</legend>

    <label class="label transition duration-300 ease-in-out">Titulo</label>
    <input required type="text" name="nuevoTitulo" class="input w-full transition duration-300 ease-in-out"
      [(ngModel)]="nuevoTitulo" placeholder="Titulo" />

    <label class="label transition duration-300 ease-in-out">Descripcion</label>
    <input required type="text" name="nuevaDescripcion" class="input w-full transition duration-300 ease-in-out"
      [(ngModel)]="nuevaDescripcion" placeholder="Descripcion" />

    <label class="label transition duration-300 ease-in-out">Imagen</label>
    <input required type="text" name="nuevaImagenURL" class="input w-full transition duration-300 ease-in-out"
      [(ngModel)]="nuevaImagenURL" placeholder="Imagen" />

    <label class="label transition duration-300 ease-in-out">Alt Imagen</label>
    <input required type="text" name="nuevoAltImagen" class="input w-full transition duration-300 ease-in-out"
      [(ngModel)]="nuevoAltImagen" placeholder="Alt Imagen" />

    <label class="label transition duration-300 ease-in-out">Boton Deshabilitado</label>
    <select required name="nuevoBotonDeshabilitado" class="select w-full transition duration-300 ease-in-out"
      [(ngModel)]="nuevoBotonDeshabilitado">
      <option value="true">Si</option>
      <option value="false">No</option>
    </select>

    <button type="submit"
      class="mt-4 rounded-lg w-full bg-blue-400 p-2 font-semibold text-white shadow-lg cursor-pointer hover:bg-blue-500 transition duration-300 ease-in-out active:bg-black active:scale-95 disabled:bg-gray-400 disabled:cursor-not-allowed">Crear</button>
  </fieldset>
</form>

<dialog id="my_modal_3" class="modal">
  <div class="modal-box">
    <form method="dialog">
      <button
        class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2 bg-base-100 transition duration-300 ease-in-out">✕</button>
    </form>
    <img [src]="imagenSeleccionada" class="w-full h-full object-cover" />
  </div>
</dialog>
